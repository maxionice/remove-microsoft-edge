name: CI

# Lint the PowerShell source and run the Pester smoke tests on every push and
# pull request.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer and Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module Pester -Scope CurrentUser -Force

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: Invoke-ScriptAnalyzer -Path .\src -Recurse -Severity Warning,Error

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester .\tests -Output Detailed
