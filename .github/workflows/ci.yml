name: CI

# Lint the whole repository with PSScriptAnalyzer and run the Pester suite on
# every push and pull request. The lint step fails the build on any finding.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer and Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module Pester -Scope CurrentUser -RequiredVersion 5.6.1 -Force

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse `
              -Settings .\PSScriptAnalyzerSettings.psd1
          $results | Format-Table -AutoSize
          if ($results) {
              throw "PSScriptAnalyzer reported $($results.Count) issue(s)."
          }

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester .\tests -Output Detailed
